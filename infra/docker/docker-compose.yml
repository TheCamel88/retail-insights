version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: retail_insights
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres/retail_insights
      REDIS_URL:    redis://redis:6379
    depends_on: [postgres, redis]
    volumes:
      - ../../backend:/app

  dashboard:
    build:
      context: ../../dashboard
    ports:
      - "3000:3000"
    depends_on: [backend]

volumes:
  pgdata:
